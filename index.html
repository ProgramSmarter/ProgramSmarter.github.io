<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
.responsive {
  width: 70%;
  height: auto;
}
.responsivegg {
  width: 80%;
  height: auto;
}
.responsiveg {
  width: 90%;
  height: auto;
}
.responsivef {
  width: 100%;
  height: auto;
}
}
body {
  font-family: "Lato", sans-serif;
}

.sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 60px;
}

.sidenav a {
  padding: 8px 8px 8px 32px;
  text-decoration: none;
  font-size: 25px;
  color: #818181;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #f1f1f1;
}

.sidenav .closebtn {
  position: absolute;
  top: 0;
  right: 25px;
  font-size: 36px;
  margin-left: 50px;
}

#main {
  transition: margin-left .5s;
  padding: 16px;
}

@media screen and (max-height: 450px) {
  .sidenav {padding-top: 15px;}
  .sidenav a {font-size: 18px;}
}

body, html {
  height: 100%;
  margin: 0;
}

.bg {
  /* The image used */
  background-image: url("gmail.png");

  /* Full height */
  height: 85%;

  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
.br {
  /* The image used */
  background-image: url("goo.png");

  /* Full height */
  height: 85%;

  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
.row {
  display: flex;
}

.column {
  flex: 33.33%;
  padding: 0px;
}
p    {
  color: #ffa500;
  font-family: Georgia;
  font-size: 100%;
  text-align: left;
}
h1   {
  color: #FFD700;
  font-family: Georgia;
  font-size: 200%
  text-align: center;
}
.center {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 50%;
}
.my-button {
    display: inline-block;
    margin: 145px; /* space between buttons */
    background: #b06f97; /* background color */
    color: #333; /* text color */
    font-size: 2em;
    font-family: ‘Georgia’, serif;
    font-style: italic;
    border-radius: 50px; /* rounded corners */
    padding: 15px 27px; /* space around text */
    -moz-transition: all 0.2s;
    -webkit-transition: all 0.2s;
    transition: all 0.2s;
}
.my-button:hover {
    background: #666;
    color: #c1e1e0;
}
body {background-color: white;}
</style>
</head>
<body>
  <div id="mySidenav" class="sidenav a">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a href="https://programsmarter.github.io">Home</a>
    <a href="https://programsmarter.github.io/Resources">Resources</a>
    <a href="https://programsmarter.github.io/about">About</a>
  </div>
  <div id="main">
    <span style="font-size:30px;cursor:pointer" onclick="openNav()">&#9776;</span>
  </div>
  </div>

  <script>
  function openNav() {
  document.getElementById("mySidenav").style.width = "250px";
  document.getElementById("main").style.marginLeft = "250px";
  }

  function closeNav() {
  document.getElementById("mySidenav").style.width = "0";
  document.getElementById("main").style.marginLeft= "0";
  }
  </script>
<img src="gmail.png" alt="ProgramSmarter" class="responsivef" width="600" height="400">
<p></p>
<p></p>
<p style="font-size:380%;">A collection of concepts and tutorials to help you become a better programmer 😁⤵</p>
<img src="goo.png" alt="ProgramSmarter" class="responsivegg" width="300" height="300">
<a href="/Resources">
<img src="rrr.jpg" alt="ProgramSmarter" class="responsiveg">
</a>
<p> </p>
</body>
</html>
