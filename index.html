<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body, html {
  height: 100%;
  margin: 0;
}

.bg {
  /* The image used */
  background-image: url("1.png.jpeg");

  /* Full height */
  height: 100%;

  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
.row {
  display: flex;
}

.column {
  flex: 33.33%;
  padding: 5px;
}
p    {
  color: tomato;
  font-family: verdana;
  font-size: 160%;    
}
</style>
</head>
<body>
<div class="bg"></div>
<p>We're creating a place for everyone to get information on programming, so you can become better at what you love.</p>

<div class="row">
  <div class="column">
    <img src="helpfullinks.jpg" alt="Helpful Links" style="width:100%">
  </div>
  <div class="column">
    <img src="blog.jpg" alt="Blog" style="width:100%">
  </div>
  <div class="column">
    <img src="tips.jpg" alt="Tips" style="width:100%">
  </div>
</div>
</body>
</html>
